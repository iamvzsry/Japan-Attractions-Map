<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日本景点地图 · 热门 + 小众</title>
    <meta
      name="description"
      content="结合 OpenStreetMap 与 Google Maps 的日本景点地图，覆盖热门与小众景点，并给出每个景点的特色说明。"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='50'%3E%F0%9F%97%BE%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <p class="kicker">Vercel Ready · OpenStreetMap + Google Maps</p>
        <h1>日本景点地图</h1>
        <p class="subtitle">
          不只热门地标，也包含地图上可检索的小众目的地。点击地图或列表，查看每个景点的核心特色。
        </p>
        <div class="hero-tags">
          <span>热门/小众双轨</span>
          <span>地区与类型筛选</span>
          <span>一键跳转地图导航</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>景点检索</h2>
          <p id="summary">加载中...</p>
        </div>

        <div class="controls">
          <label class="control">
            <span>关键词</span>
            <input id="searchInput" type="search" placeholder="输入景点名 / 特色 / 都道府县" />
          </label>

          <label class="control">
            <span>地区</span>
            <select id="regionSelect">
              <option value="all">全部地区</option>
            </select>
          </label>

          <label class="control">
            <span>类型</span>
            <select id="categorySelect">
              <option value="all">全部类型</option>
            </select>
          </label>

          <label class="control">
            <span>热度</span>
            <select id="popularitySelect">
              <option value="all">全部</option>
              <option value="热门">热门</option>
              <option value="小众">小众</option>
            </select>
          </label>
        </div>

        <div id="attractionList" class="attraction-list" aria-live="polite"></div>
      </aside>

      <section class="map-column">
        <div id="map" class="map" aria-label="日本景点地图"></div>
        <article id="detailCard" class="detail-card empty">
          <h3>选择一个景点</h3>
          <p>从左侧列表或地图标记中选择，查看该景点的特色、类别和地图跳转链接。</p>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p>
        经纬度来源：OpenStreetMap Nominatim（地理编码） ·
        景点链接：Google Maps Search（可直接导航）
      </p>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
